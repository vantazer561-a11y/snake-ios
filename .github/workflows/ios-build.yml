name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          ls /Applications | grep -i Xcode || true
          sudo xcode-select -s /Applications/Xcode_16.app \
            || sudo xcode-select -s /Applications/Xcode_16.1.app \
            || sudo xcode-select -s /Applications/Xcode_16.2.app \
            || sudo xcode-select -s /Applications/Xcode.app

      - name: Versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app for iOS device
        run: |
          set -o pipefail
          xcodebuild \
            -project SnakeGame.xcodeproj \
            -scheme SnakeGame \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_BITCODE=NO \
            clean build

      - name: Package unsigned .ipa
        run: |
          set -euxo pipefail
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 2 -name "SnakeGame.app" -type d | head -n 1)
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr SnakeGame-unsigned.ipa Payload
          rm -rf Payload
          ls -lh SnakeGame-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: SnakeGame-unsigned-ipa
          path: SnakeGame-unsigned.ipa
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/Logs
          if-no-files-found: ignore
